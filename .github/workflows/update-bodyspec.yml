# KOSIS 통계 자동 갱신 — ① 신체 표준(건강검진통계 orgId=350) → bodyspec.ts ② 감염병 사망(사망원인통계 orgId=101) → death-eid.ts.
# 목적: 매년 사람 손 없이 최신화(하드코딩 영구방치 X). 월 1회면 충분(통계 연 1회 공표, 새 연도 자료 자동 반영).
# 필요 시크릿: KOSIS_KEY (https://kosis.kr/openapi/ 무료 발급). 미설정이면 시드 유지(데이터 유실 없음).
name: update-bodyspec

on:
  schedule:
    - cron: '30 20 1 * *'   # 매월 1일 05:30 KST (전월말일 20:30 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 신체 표준 통계 재수집(KOSIS orgId=350)
        env:
          KOSIS_KEY: ${{ secrets.KOSIS_KEY }}
        run: node scripts/fetch-bodyspec.mjs
      - name: 감염병 사망현황 재수집(KOSIS 사망원인통계 orgId=101)
        env:
          KOSIS_KEY: ${{ secrets.KOSIS_KEY }}
        run: node scripts/fetch-death-kosis.mjs
      - name: 건강검진 수치 분포 재수집(KOSIS 건강검진통계 orgId=350)
        env:
          KOSIS_KEY: ${{ secrets.KOSIS_KEY }}
        run: node scripts/fetch-checkup-dist.mjs
      - name: 시도별 감염병 사망 재수집(KOSIS 사망원인통계 DT_1B34E11)
        env:
          KOSIS_KEY: ${{ secrets.KOSIS_KEY }}
        run: node scripts/fetch-death-region-kosis.mjs
      - name: 변경분만 커밋
        run: |
          if git diff --quiet -- frontend/src/data/bodyspec.ts frontend/src/data/death-eid.ts frontend/src/data/checkup-dist.ts frontend/src/data/death-region.ts; then
            echo "변경 없음 — 커밋 생략"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add frontend/src/data/bodyspec.ts frontend/src/data/death-eid.ts frontend/src/data/checkup-dist.ts frontend/src/data/death-region.ts
            git commit -m "chore: KOSIS 통계 자동 갱신 (신체·사망·검진분포·시도사망)"
            git push
          fi
