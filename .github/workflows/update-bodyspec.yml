# 신체 표준 통계 자동 갱신 — KOSIS OpenAPI로 연령대별·성별 평균 신장/체중(건강검진통계 orgId=350)을 받아 bodyspec.ts 재생성.
# 목적: 매년 사람 손 없이 최신화(하드코딩 영구방치 X). 월 1회면 충분(통계 갱신 빈도 낮음, 새 연도 자료 자동 반영).
# 필요 시크릿: KOSIS_KEY (https://kosis.kr/openapi/ 무료 발급). 미설정이면 시드 유지(데이터 유실 없음).
name: update-bodyspec

on:
  schedule:
    - cron: '30 20 1 * *'   # 매월 1일 05:30 KST (전월말일 20:30 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 신체 표준 통계 재수집(KOSIS)
        env:
          KOSIS_KEY: ${{ secrets.KOSIS_KEY }}
        run: node scripts/fetch-bodyspec.mjs
      - name: 변경분만 커밋
        run: |
          if git diff --quiet -- frontend/src/data/bodyspec.ts; then
            echo "변경 없음 — 커밋 생략"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add frontend/src/data/bodyspec.ts
            git commit -m "chore: 신체 표준 통계 자동 갱신 (KOSIS·병무청·질병청)"
            git push
          fi
