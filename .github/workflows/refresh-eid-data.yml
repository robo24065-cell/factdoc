# 감염병 발생현황 데이터 자동 갱신 — 질병관리청 감염병포털 EDW 대시보드 데이터를 매일 다시 받아 캐시.
# per-request 외부호출 금지(§13.7) → 배치 cron으로 최신화. 진행중인 현재년의 최신 주차가 매일 갱신됨.
# EDW 공개 포털이라 인증키 불필요 — 시크릿 설정 없이 바로 동작.
name: refresh-eid-data

on:
  schedule:
    - cron: '10 21 * * *'   # 매일 06:10 KST (전일 21:10 UTC)
    - cron: '10 9 * * *'    # 매일 18:10 KST (09:10 UTC) — 하루 2회 자동 최신화
  workflow_dispatch:          # 수동 실행 버튼

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 감염병 발생현황 재수집(시도×연 + 시도×주, 발생수·발생률)
        run: node scripts/fetch-eid-edw.mjs
      - name: 변경분만 커밋
        run: |
          if git diff --quiet -- frontend/src/data/eid-region.ts; then
            echo "변경 없음 — 커밋 생략"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add frontend/src/data/eid-region.ts
            git commit -m "chore: 감염병 발생현황 데이터 자동 갱신 (질병청 감염병포털)"
            git push
          fi
